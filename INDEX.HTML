<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Mochila</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url('https://wallpapers.com/images/hd/spider-man-swinging-through-city-night-eoexy11abapsvdtk.jpg') center/cover no-repeat fixed;
            color: white;
            background-color: #0f0f1a; /* fallback */
        }
        header {
            background: rgba(217, 4, 41, 0.85);
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #ffcc00;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .disciplina {
            background: rgba(30, 30, 60, 0.75);
            border-radius: 16px;
            padding: 18px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .disciplina h2 {
            margin: 0 0 15px 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon {
            font-size: 28px;
            color: #ffcc00;
        }
        .aulas {
            min-height: 60px;
            margin-bottom: 12px;
        }
        .aula {
            background: rgba(255,255,255,0.12);
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            transition: all 0.2s;
        }
        .aula:hover {
            background: rgba(255,255,255,0.22);
        }
        .delete-btn {
            background: #d90429;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #a1031f;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 15px;
        }
        input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #d90429;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #a1031f;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(36,0,70,0.8);
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        🎒 Minha Mochila - Estudos do Miles
    </header>

    <div class="container">
        <div class="disciplina">
            <h2><i class="fa-solid fa-book icon"></i> Matemática</h2>
            <div class="aulas" id="matematica"></div>
            <input type="text" id="input-matematica" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('matematica')">
            <button onclick="addAula('matematica')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-book icon"></i> Português</h2>
            <div class="aulas" id="portugues"></div>
            <input type="text" id="input-portugues" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('portugues')">
            <button onclick="addAula('portugues')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-book icon"></i> História</h2>
            <div class="aulas" id="historia"></div>
            <input type="text" id="input-historia" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('historia')">
            <button onclick="addAula('historia')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-book icon"></i> Geografia</h2>
            <div class="aulas" id="geografia"></div>
            <input type="text" id="input-geografia" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('geografia')">
            <button onclick="addAula('geografia')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-flask icon"></i> Ciências</h2>
            <div class="aulas" id="ciencias"></div>
            <input type="text" id="input-ciencias" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('ciencias')">
            <button onclick="addAula('ciencias')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-globe icon"></i> Inglês</h2>
            <div class="aulas" id="ingles"></div>
            <input type="text" id="input-ingles" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('ingles')">
            <button onclick="addAula('ingles')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-code icon"></i> Programação</h2>
            <div class="aulas" id="programacao"></div>
            <input type="text" id="input-programacao" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('programacao')">
            <button onclick="addAula('programacao')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-robot icon"></i> Robótica</h2>
            <div class="aulas" id="robotica"></div>
            <input type="text" id="input-robotica" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('robotica')">
            <button onclick="addAula('robotica')">Adicionar Aula</button>
        </div>

        <div class="disciplina">
            <h2><i class="fa-solid fa-brain icon"></i> Inteligência Artificial</h2>
            <div class="aulas" id="ia"></div>
            <input type="text" id="input-ia" placeholder="Adicionar aula..." onkeypress="if(event.key === 'Enter') addAula('ia')">
            <button onclick="addAula('ia')">Adicionar Aula</button>
        </div>
    </div>

    <footer>
        ⚡ Plataforma de estudos - Minha Mochila | Feito com carinho e vibe Miles Morales
    </footer>

    <script>
        function addAula(disciplina) {
            const input = document.getElementById("input-" + disciplina);
            const lista = document.getElementById(disciplina);
            const texto = input.value.trim();

            if (texto !== "") {
                const novaAula = document.createElement("div");
                novaAula.className = "aula";
                
                const spanTexto = document.createElement("span");
                spanTexto.textContent = texto;
                
                const btnApagar = document.createElement("button");
                btnApagar.className = "delete-btn";
                btnApagar.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                btnApagar.onclick = () => novaAula.remove();
                
                novaAula.appendChild(spanTexto);
                novaAula.appendChild(btnApagar);
                
                lista.appendChild(novaAula);
                input.value = "";
            }
        }
    </script>
</body>
</html>
