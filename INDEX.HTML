<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Mochila</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:linear-gradient(120deg,#1e3c72,#6a11cb);
    color:white;
}

header{
    background:#d90429;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.disciplina{
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    padding:15px;
    backdrop-filter: blur(6px);
}

.disciplina h2{
    color:#fff;
    font-size:20px;
}

.icon{
    font-size:25px;
    color:#ffcc00;
}

.aulas{
    margin-top:10px;
}

.aula{
    background:rgba(0,0,0,0.3);
    padding:6px;
    margin:5px 0;
    border-radius:6px;
}

input{
    width:100%;
    padding:5px;
    margin-top:8px;
    border:none;
    border-radius:5px;
}

button{
    margin-top:5px;
    width:100%;
    padding:6px;
    border:none;
    border-radius:5px;
    background:#d90429;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#a1031f;
}

footer{
    text-align:center;
    padding:15px;
    background:#240046;
}

</style>
</head>

<body>

<header>
🎒 Minha Mochila
</header>

<div class="container">

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Matemática</h2>
<div class="aulas" id="matematica"></div>
<input type="text" id="input-matematica" placeholder="Adicionar aula">
<button onclick="addAula('matematica')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Português</h2>
<div class="aulas" id="portugues"></div>
<input type="text" id="input-portugues" placeholder="Adicionar aula">
<button onclick="addAula('portugues')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> História</h2>
<div class="aulas" id="historia"></div>
<input type="text" id="input-historia" placeholder="Adicionar aula">
<button onclick="addAula('historia')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Geografia</h2>
<div class="aulas" id="geografia"></div>
<input type="text" id="input-geografia" placeholder="Adicionar aula">
<button onclick="addAula('geografia')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Ciências</h2>
<div class="aulas" id="ciencias"></div>
<input type="text" id="input-ciencias" placeholder="Adicionar aula">
<button onclick="addAula('ciencias')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Inglês</h2>
<div class="aulas" id="ingles"></div>
<input type="text" id="input-ingles" placeholder="Adicionar aula">
<button onclick="addAula('ingles')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Programação</h2>
<div class="aulas" id="programacao"></div>
<input type="text" id="input-programacao" placeholder="Adicionar aula">
<button onclick="addAula('programacao')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Robótica</h2>
<div class="aulas" id="robotica"></div>
<input type="text" id="input-robotica" placeholder="Adicionar aula">
<button onclick="addAula('robotica')">Adicionar Aula</button>
</div>

<div class="disciplina">
<h2><i class="fa-solid fa-futbol icon"></i> Inteligência Artificial</h2>
<div class="aulas" id="ia"></div>
<input type="text" id="input-ia" placeholder="Adicionar aula">
<button onclick="addAula('ia')">Adicionar Aula</button>
</div>

</div>

<footer>
⚽ Plataforma de estudos - Minha Mochila
</footer>

<script>

function addAula(disciplina){

let input = document.getElementById("input-"+disciplina)
let lista = document.getElementById(disciplina)

if(input.value.trim() !== ""){

let novaAula = document.createElement("div")
novaAula.className="aula"
novaAula.textContent = input.value

lista.appendChild(novaAula)

input.value=""

}

}

</script>

</body>
</html>
