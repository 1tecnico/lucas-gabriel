<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mochila de Estudos - Lucas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #f8f9fc;
      --sidebar: #ffffff;
      --text: #2d3748;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --done: #10b981;
      --border: #e2e8f0;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 320px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0,0,0,0.03);
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header i {
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .header h2 {
      margin: 0;
      font-size: 1.35rem;
      color: var(--text);
    }
    .add-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    button {
      padding: 0 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: var(--accent-hover);
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 14px 16px;
      margin: 8px 0;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
      position: relative;
    }
    li:hover {
      background: #e2e8f0;
      transform: translateX(4px);
    }
    li.riscado {
      background: #ecfdf5;
      color: #64748b;
      text-decoration: line-through;
    }
    li.riscado .icone-check {
      color: var(--done);
    }
    li.aberto {
      background: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding-bottom: 0;
    }
    .conteudo-li {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .anotacao-area {
      margin-top: 12px;
      padding: 0 4px 14px 4px;
    }
    .anotacao-area textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      font-family: inherit;
    }
    .anotacao-area textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .principal {
      flex: 1;
      padding: 48px 40px;
    }
    .principal h1 {
      margin-top: 0;
      color: var(--accent);
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="header">
    <i class="fa-solid fa-book-open"></i>
    <h2>Minha Mochila</h2>
  </div>

  <div class="add-area">
    <input id="txt" placeholder="Nova matéria..." autofocus>
    <button id="btnAdd"><i class="fa-solid fa-plus"></i></button>
  </div>

  <ul id="lista"></ul>
</div>

<div class="principal">
  <h1>Bem-vindo à sua mochila de estudos</h1>
  <p style="color:#64748b; line-height:1.6;">
    • Clique = marcar/desmarcar + abrir anotação<br>
    • Duplo clique no nome = editar título da matéria<br>
    • Escreva suas anotações, resumos, links etc. abaixo
  </p>
</div>

<script>
const input = document.getElementById('txt');
const btnAdd = document.getElementById('btnAdd');
const lista = document.getElementById('lista');

let materias = JSON.parse(localStorage.getItem('mochila_lista')) || [];

function salvar() {
  localStorage.setItem('mochila_lista', JSON.stringify(materias));
  renderizar();
}

function renderizar() {
  lista.innerHTML = '';

  materias.forEach((item, i) => {
    const li = document.createElement('li');
    if (item.feito) li.classList.add('riscado');
    if (item.aberto) li.classList.add('aberto');

    const conteudo = document.createElement('div');
    conteudo.className = 'conteudo-li';

    const icone = document.createElement('i');
    icone.className = item.feito 
      ? 'fa-solid fa-check-circle icone-check' 
      : 'fa-regular fa-circle';
    conteudo.appendChild(icone);

    const texto = document.createTextNode(item.texto);
    conteudo.appendChild(texto);

    li.appendChild(conteudo);

    // Área de anotação (só aparece se aberto)
    if (item.aberto) {
      const anotArea = document.createElement('div');
      anotArea.className = 'anotacao-area';

      const textarea = document.createElement('textarea');
      textarea.placeholder = "Escreva aqui suas anotações, resumo, links...";
      textarea.value = item.anotacao || '';
      
      textarea.oninput = () => {
        item.anotacao = textarea.value;
        salvar();  // salva a cada digitação (pode mudar para onblur se preferir)
      };

      anotArea.appendChild(textarea);
      li.appendChild(anotArea);
    }

    // Clique simples → toggle riscado + abrir/fechar anotação
    li.addEventListener('click', e => {
      if (e.detail === 1 && !e.target.tagName === 'TEXTAREA') {
        item.feito = !item.feito;
        item.aberto = !item.aberto;
        salvar();
      }
    });

    // Duplo clique no título → editar nome
    conteudo.addEventListener('dblclick', (e) => {
      e.stopPropagation(); // evita abrir/fechar anotação
      const antigo = item.texto;
      conteudo.innerHTML = '';

      const editInput = document.createElement('input');
      editInput.type = 'text';
      editInput.value = antigo;
      editInput.style.width = '100%';
      editInput.style.padding = '8px 12px';
      editInput.style.border = '1px solid #cbd5e1';
      editInput.style.borderRadius = '8px';
      editInput.style.fontSize = '1rem';

      const salvarEdit = () => {
        const novo = editInput.value.trim();
        if (novo) item.texto = novo;
        salvar();
      };

      editInput.onblur = salvarEdit;
      editInput.onkeydown = e => { if (e.key === 'Enter') salvarEdit(); };

      conteudo.appendChild(editInput);
      editInput.focus();
      editInput.select();
    });

    lista.appendChild(li);
  });
}

function adicionar() {
  const texto = input.value.trim();
  if (!texto) return;

  materias.push({ 
    texto, 
    feito: false, 
    aberto: false, 
    anotacao: '' 
  });
  
  input.value = '';
  input.focus();
  salvar();
}

btnAdd.onclick = adicionar;
input.onkeypress = e => { if (e.key === 'Enter') adicionar(); };

// Inicializa
renderizar();
</script>

</body>
</html>
