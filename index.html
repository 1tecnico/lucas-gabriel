<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#000;
}

/* HEADER */
header{
  background:#000;
  color:white;
  text-align:center;
  padding:15px;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  background:#222;
  padding:10px;
}
.menu button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ABAS */
.aba{display:none; padding:15px;}
.ativa{display:block;}

/* MOCHILA */
#materias{
  min-height:300px;
  background-size:cover;
  background-position:center;
  transition:0.3s;
}

/* BILHETE DE MATÉRIA */
.materia{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
.materia textarea{
  width:100%;
  height:80px;
  border-radius:8px;
}

/* FOTOS */
img{
  max-width:120px;
  margin:5px;
  border-radius:10px;
}

/* MEMES FEED (TIKTOK STYLE) */
#feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.item{
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
}

.item img, .item video{
  max-width:100%;
  max-height:100%;
}

/* BOTÃO FIXO MEME */
.uploadMeme{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🎒 Mochila Digital</h1>
</header>

<div class="menu">
<button onclick="trocar('materias')">📚 Mochila</button>
<button onclick="trocar('fotos')">🖼️ Fotos</button>
<button onclick="trocar('memes')">🎬 Memes</button>
<button onclick="trocar('config')">⚙️ Fundo</button>
</div>

<div id="materias" class="aba ativa">

<h2>📚 Matérias</h2>

<input id="materiaNome" placeholder="Nome da matéria">
<button onclick="addMateria()">Adicionar</button>

<div id="listaMaterias"></div>

</div>

<!-- FOTOS -->
<div id="fotos" class="aba">
<h2>🖼️ Fotos</h2>
<input type="file" id="fotoInput" accept="image/*">
<button onclick="addFoto()">Adicionar</button>
<div id="galeria"></div>
</div>

<!-- MEMES -->
<div id="memes" class="aba">

<h2>🎬 Feed de Memes</h2>

<div id="feed"></div>

<input type="file" id="memeInput" accept="image/*,video/*">
<button class="uploadMeme" onclick="addMeme()">➕</button>

</div>

<!-- CONFIG -->
<div id="config" class="aba">
<h2>⚙️ Fundo da Mochila</h2>
<input type="file" accept="image/*" onchange="bg(event)">
</div>

<script>

function trocar(id){
  document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

/* =========================
   MATÉRIAS COMO BILHETE
========================= */
function addMateria(){
  const nome = document.getElementById('materiaNome');
  if(!nome.value) return;

  const div = document.createElement('div');
  div.className="materia";

  div.innerHTML=`
    <h3 contenteditable="true">${nome.value}</h3>
    <textarea placeholder="Escreva o que aconteceu na aula..."></textarea>
    <button onclick="this.parentElement.remove()">🗑️ Excluir</button>
  `;

  document.getElementById('listaMaterias').appendChild(div);
  nome.value="";
}

/* =========================
   FOTOS
========================= */
function addFoto(){
  const input=document.getElementById('fotoInput');
  const file=input.files[0];
  if(!file) return;

  const r=new FileReader();
  r.onload=e=>{
    const img=document.createElement('img');
    img.src=e.target.result;
    document.getElementById('galeria').appendChild(img);
  }
  r.readAsDataURL(file);
}

/* =========================
   MEMES TIKTOK STYLE
========================= */
function addMeme(){
  const input=document.getElementById('memeInput');
  const file=input.files[0];
  if(!file) return;

  const r=new FileReader();
  r.onload=e=>{
    const div=document.createElement('div');
    div.className="item";

    if(file.type.startsWith("video")){
      div.innerHTML=`<video src="${e.target.result}" controls autoplay loop></video>`;
    } else {
      div.innerHTML=`<img src="${e.target.result}">`;
    }

    document.getElementById('feed').appendChild(div);
  }

  r.readAsDataURL(file);
  input.value="";
}

/* =========================
   FUNDO
========================= */
function bg(e){
  const file=e.target.files[0];
  const r=new FileReader();

  r.onload=ev=>{
    document.getElementById('materias').style.backgroundImage=`url(${ev.target.result})`;
    localStorage.setItem('bg',ev.target.result);
  }

  r.readAsDataURL(file);
}

window.onload=()=>{
  const bg=localStorage.getItem('bg');
  if(bg){
    document.getElementById('materias').style.backgroundImage=`url(${bg})`;
  }
}

</script>

</body>
