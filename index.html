<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minha Mochila</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
    }
    .mochila {
      width: 260px;
      background: #1a1a2e;
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #333;
    }
    h2 {
      margin: 0 0 16px 0;
      color: #88f;
      font-size: 1.4rem;
      text-align: center;
    }
    .entrada {
      display: flex;
      margin-bottom: 16px;
      gap: 6px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      color: white;
      font-size: 1rem;
    }
    button {
      padding: 0 14px;
      background: #4466ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #5577ff;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 12px 10px;
      margin: 6px 0;
      background: #25253f;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    li:hover {
      background: #303050;
    }
    li.riscado {
      text-decoration: line-through;
      color: #777;
      background: #1e1e30;
    }
    .principal {
      flex: 1;
      padding: 40px;
    }
  </style>
</head>
<body>

<div class="mochila">
  <h2>Matérias</h2>
  
  <div class="entrada">
    <input id="txt" placeholder="Digite a matéria..." autofocus>
    <button id="btnAdd">+</button>
  </div>

  <ul id="lista"></ul>
</div>

<div class="principal">
  <h1>Sua mochila de estudos</h1>
  <p>Clique nas matérias para marcar como concluída.</p>
</div>

<script>
const input = document.getElementById('txt');
const btnAdd = document.getElementById('btnAdd');
const lista = document.getElementById('lista');

let materias = JSON.parse(localStorage.getItem('mochila')) || [];

function salvar() {
  localStorage.setItem('mochila', JSON.stringify(materias));
  renderizar();
}

function renderizar() {
  lista.innerHTML = '';
  materias.forEach((item, i) => {
    const li = document.createElement('li');
    li.textContent = item.texto;
    if (item.feito) li.classList.add('riscado');
    
    li.onclick = () => {
      materias[i].feito = !materias[i].feito;
      salvar();
    };
    
    lista.appendChild(li);
  });
}

function adicionar() {
  const texto = input.value.trim();
  if (!texto) return;
  
  materias.push({ texto, feito: false });
  input.value = '';
  input.focus();           // volta o foco pro input (melhor usabilidade)
  salvar();
}

// Eventos
btnAdd.addEventListener('click', adicionar);

input.addEventListener('keypress', e => {
  if (e.key === 'Enter') {
    adicionar();
  }
});

// Carrega na abertura
renderizar();
</script>

</body>
</html>
